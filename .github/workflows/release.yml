name: release
# One-time human setup (before first tag):
#   1. Create the PyPI project "fusion-cli" and register this repo +
#      this workflow as a trusted publisher
#      (https://docs.pypi.org/trusted-publishers/). No tokens stored.
#   2. Create a GitHub environment named "pypi" (Settings → Environments)
#      — the publish job pins `environment: pypi`.
on:
  push:
    tags: ["v*"]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Tag must equal pyproject version
        run: |
          V="$(grep -m1 '^version' cli/pyproject.toml | cut -d'"' -f2)"
          [ "v$V" = "${GITHUB_REF_NAME}" ] || { echo "tag ${GITHUB_REF_NAME} != v$V"; exit 1; }
      - name: Build (hook bundles the skills)
        working-directory: cli
        run: uv build --out-dir ../dist
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
